name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────
  # Python checks
  # ─────────────────────────────────────────
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    # Only runs if there are Python files in the repo
    if: ${{ hashFiles('**/*.py') != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project deps if requirements file exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # Install linting tools
          pip install ruff pytest

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Run tests
        run: |
          if [ -d tests ] || find . -name "test_*.py" | grep -q .; then
            pytest --tb=short -q
          else
            echo "No tests found — skipping"
          fi

  # ─────────────────────────────────────────
  # Node / TypeScript checks
  # ─────────────────────────────────────────
  node:
    name: Node.js (lint + build)
    runs-on: ubuntu-latest
    # Only runs if there's a package.json
    if: ${{ hashFiles('**/package.json') != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          if npm run lint --if-present 2>/dev/null; then
            echo "Lint passed"
          else
            echo "No lint script found — skipping"
          fi

      - name: Type check
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json — skipping type check"
          fi

      - name: Run tests
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Tests passed"
          else
            echo "No test script found — skipping"
          fi

  # ─────────────────────────────────────────
  # Final gate — this is what you add to the
  # "Required status checks" field in GitHub
  # ─────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [python, node]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.python.result }}" == "failure" || "${{ needs.node.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed ✅"
